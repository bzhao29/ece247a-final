# @package _global_

downsample:
  _target_: emg2qwerty.transforms.DownsampleEMG
  factor: 1

module:
  _target_: emg2qwerty.tds_gru_module.TDSGRUCTCModule
  in_features: 528
  mlp_features: [384]
  block_channels: [24, 24, 24, 24]
  kernel_width: 32
  hidden_size: 384
  num_layers: 3
  dropout: 0.15
  bidirectional: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 16000
  padding: [1800, 200]

transforms:
  train:
    - ${to_tensor}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${downsample}
    - ${logspec}
  val:
    - ${to_tensor}
    - ${downsample}
    - ${logspec}
  test: ${transforms.val}