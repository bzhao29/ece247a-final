# @package _global_

module:
  _target_: emg2qwerty.tds_transformer_module.TDSTransformerCTCModule
  in_features: 528
  mlp_features: [384]
  block_channels: [24, 24, 24, 24]
  kernel_width: 32

  d_model: 384
  nhead: 8
  num_layers: 4
  dim_feedforward: 768
  dropout: 0.15

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]

transforms:
  train:
    - ${to_tensor}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${logspec}
  val:
    - ${to_tensor}
    - ${logspec}
  test: ${transforms.val}